        const app = initializeApp(firebaseConfig);

        const googleProvider = new GoogleAuthProvider();

        let isLoginMode = false;

        window.checkUserLimitAndLock = async function() {
            if(!window.currentUser) return false;
            const uid = window.currentUser.uid;
            const userRef = doc(window.db, "users", uid);
            try {
                const docSnap = await getDoc(userRef);
                const now = Date.now();
                const LIMIT = 6000; // 6000 Tokens Daily Limit
                const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;

                if (docSnap.exists()) {
                    let data = docSnap.data();
                    let lastReset = data.last_reset_time || 0;
                    let tokens = data.used_tokens || 0;

                    if (now - lastReset >= TWENTY_FOUR_HOURS) {
                        await updateDoc(userRef, { used_tokens: 0, last_reset_time: now });
                        window.unlockUI();
                        return true;
                    } else if (tokens >= LIMIT) {
                        window.lockUIForLimit(lastReset + TWENTY_FOUR_HOURS);
                        return false;
                    } else {
                        window.unlockUI();
                        return true;
                    }
                } else {
                    await setDoc(userRef, { used_tokens: 0, last_reset_time: now });
                    window.unlockUI();
                    return true;
                }
            } catch (err) {
                console.error("Error checking limits:", err);
                return true; 
            }
        };

        window.incrementUserLimit = async function(estimatedTokens) {
            if(!window.currentUser) return;
            const uid = window.currentUser.uid;
            const userRef = doc(window.db, "users", uid);
            try {
                const docSnap = await getDoc(userRef);
                if (docSnap.exists()) {
                    let tokens = docSnap.data().used_tokens || 0;
                    await updateDoc(userRef, { used_tokens: tokens + estimatedTokens });
                }
            } catch(e) {}
        };

        window.lockUIForLimit = function(resetTimeMs) {
            let dateObj = new Date(resetTimeMs);
            let timeString = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            let msg = `Your daily limit has reached please comes tomorrow ${timeString}`;
            
            const input = document.getElementById('user-input');
            input.disabled = true;
            input.placeholder = msg;
            
            document.getElementById('mike-btn-container').style.pointerEvents = 'none';
            document.getElementById('mike-btn-container').style.opacity = '0.5';
            document.getElementById('plus-btn-wrapper').style.pointerEvents = 'none';
            document.getElementById('plus-btn-wrapper').style.opacity = '0.5';
            document.getElementById('send-btn-ui').style.pointerEvents = 'none';
            document.getElementById('send-btn-ui').style.opacity = '0.5';
            
            const container = document.getElementById('chat-container');
            let existingAlert = document.getElementById('limit-alert');
            if(existingAlert) existingAlert.remove();

            const alertRow = document.createElement('div');
            alertRow.id = 'limit-alert';
            alertRow.innerHTML = `<div style="text-align: center; color: #ff3333; font-weight: 600; font-size: 14px; margin-top: 20px; padding: 10px; background: #ffebeb; border-radius: 8px;">${msg}</div>`;
            container.appendChild(alertRow);
            container.scrollTop = container.scrollHeight;
        };

        window.unlockUI = function() {
            const input = document.getElementById('user-input');
            input.disabled = false;
            let currentAppLang = localStorage.getItem('datex_app_lang') || 'english';
            if (currentAppLang === 'english') input.placeholder = "Ask Anything";
            document.getElementById('mike-btn-container').style.pointerEvents = 'auto';
            document.getElementById('mike-btn-container').style.opacity = '1';
            document.getElementById('plus-btn-wrapper').style.pointerEvents = 'auto';
            document.getElementById('plus-btn-wrapper').style.opacity = '1';
            document.getElementById('send-btn-ui').style.pointerEvents = 'auto';
            document.getElementById('send-btn-ui').style.opacity = '1';
            
            let existingAlert = document.getElementById('limit-alert');
            if(existingAlert) existingAlert.remove();
        };

        window.truncateText = function(text, limit) {
            if (!text) return "";
            return text.length > limit ? text.substring(0, limit) + "..." : text;
        };

        window.toggleProfileModal = () => {
            document.getElementById('profile-modal').classList.toggle('active');
            document.getElementById('profile-overlay').classList.toggle('active');
        };

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            signUpPhase = 1; 
            
            document.getElementById('email-error-msg').classList.remove('show');
            document.getElementById('password-error-msg').classList.remove('show');
            document.getElementById('name-error-msg').classList.remove('show');

            const nameContainer = document.getElementById('name-input-container');
            const emailContainer = document.getElementById('email-input-container');
            const pwdContainer = document.getElementById('password-input-container');
            const btn = document.getElementById('auth-confirm-btn');

            if(isLoginMode) {
                nameContainer.style.display = 'none';
                emailContainer.style.display = 'block';
                pwdContainer.style.display = 'block';
                btn.innerText = "Log In"; 
                btn.style.marginTop = "5px";
                document.getElementById('auth-switch-text').innerHTML = `Don't have any account?<b onclick="window.toggleAuthMode()">SIGN UP</b>`;
            } else {
                nameContainer.style.display = 'none';
                emailContainer.style.display = 'block';
                pwdContainer.style.display = 'block';
                btn.innerText = "Sign Up";
                btn.style.marginTop = "5px";
                document.getElementById('auth-switch-text').innerHTML = `Already have an account?<b onclick="window.toggleAuthMode()">LOG IN</b>`;
            }
        };

        window.handleEmailAuth = () => {
            const nameInput = document.getElementById('auth-name');
            const emailInput = document.getElementById('auth-email');
            const passwordInput = document.getElementById('auth-password');
            const btn = document.getElementById('auth-confirm-btn');
            
            const nameErr = document.getElementById('name-error-msg');
            const emailErr = document.getElementById('email-error-msg');
            const pwdErr = document.getElementById('password-error-msg');

            nameErr.classList.remove('show');
            emailErr.classList.remove('show');
            pwdErr.classList.remove('show');

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const name = nameInput.value.trim();

            let hasError = false;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            const handleError = (err) => {
                if (signUpPhase === 2 && (err.code === 'auth/email-already-in-use' || err.code === 'auth/invalid-email' || err.code === 'auth/weak-password' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found')) {
                    signUpPhase = 1;
                    document.getElementById('name-input-container').style.display = 'none';
                    document.getElementById('email-input-container').style.display = 'block';
                    document.getElementById('password-input-container').style.display = 'block';
                    btn.innerText = isLoginMode ? "Log In" : "Sign Up";
                    btn.style.marginTop = "5px";
                }

                if(err.code === 'auth/invalid-email' || err.code === 'auth/user-not-found') {
                    emailErr.innerText = "Invalid email";
                    emailErr.classList.add('show');
                } else if (err.code === 'auth/email-already-in-use') {
                    emailErr.innerText = "Email is already registered";
                    emailErr.classList.add('show');
                } else if(err.code === 'auth/wrong-password' || err.code === 'auth/weak-password') {
                    pwdErr.innerText = "Invalid password";
                    pwdErr.classList.add('show');
                } else if(err.code === 'auth/invalid-credential') {
                    emailErr.innerText = "Invalid email";
                    emailErr.classList.add('show');
                    pwdErr.innerText = "Invalid password";
                    pwdErr.classList.add('show');
                } else {
                    pwdErr.innerText = "Invalid password";
                    pwdErr.classList.add('show');
                }
            };

            if(isLoginMode) {
                if(signUpPhase === 1) {
                    if(!email || !emailRegex.test(email)) { emailErr.innerText = "Invalid email"; emailErr.classList.add('show'); hasError = true; }
                    if(!password) { pwdErr.innerText = "Invalid password"; pwdErr.classList.add('show'); hasError = true; }
                    if(hasError) return;
                    
                    signUpPhase = 2;
                    document.getElementById('email-input-container').style.display = 'none';
                    document.getElementById('password-input-container').style.display = 'none';
                    document.getElementById('name-input-container').style.display = 'block';
                    btn.innerText = "Log In";
                    btn.style.marginTop = "40px";
                } else if(signUpPhase === 2) {
                    if(!name) { nameErr.innerText = "Please enter your name"; nameErr.classList.add('show'); hasError = true; }
                    if(hasError) return;

                    signInWithEmailAndPassword(auth, email, password)
                        .then((userCredential) => {
                            return updateProfile(userCredential.user, {
                                displayName: name
                            }).then(() => {
                                window.currentUser = auth.currentUser;
                                updateUserUI(auth.currentUser);
                            });
                        })
                        .catch(handleError);
                }
            } else {
                if(signUpPhase === 1) {
                    if(!email || !emailRegex.test(email)) { emailErr.innerText = "Invalid email"; emailErr.classList.add('show'); hasError = true; }
                    if(!password || password.length < 6) { pwdErr.innerText = "Password must be at least 6 chars"; pwdErr.classList.add('show'); hasError = true; }
                    if(hasError) return;

                    signUpPhase = 2;
                    document.getElementById('email-input-container').style.display = 'none';
                    document.getElementById('password-input-container').style.display = 'none';
                    document.getElementById('name-input-container').style.display = 'block';
                    btn.innerText = "Sign Up";
                    btn.style.marginTop = "40px"; 
                    
                } else if(signUpPhase === 2) {
                    if(!name) { nameErr.innerText = "Please enter your name"; nameErr.classList.add('show'); hasError = true; }
                    if(hasError) return;

                    createUserWithEmailAndPassword(auth, email, password)
                        .then((userCredential) => {
                            return updateProfile(userCredential.user, {
                                displayName: name
                            }).then(() => {
                                window.currentUser = auth.currentUser;
                                updateUserUI(auth.currentUser);
                            });
                        })
                        .catch(handleError);
                }
            }
        };

        document.getElementById('auth-name').addEventListener('input', () => {
            const el = document.getElementById('name-error-msg');
            if(el.classList.contains('show')) el.classList.remove('show');
        });
        document.getElementById('auth-email').addEventListener('input', () => {
            const el = document.getElementById('email-error-msg');
            if(el.classList.contains('show')) el.classList.remove('show');
        });
        document.getElementById('auth-password').addEventListener('input', () => {
            const el = document.getElementById('password-error-msg');
            if(el.classList.contains('show')) el.classList.remove('show');
        });

        window.togglePasswordVisibility = () => {
            const pwdInput = document.getElementById('auth-password');
            const icon = document.getElementById('togglePassword');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
            pwdInput.focus();
        };

        window.loginWithGoogle = () => { 
            document.getElementById('email-error-msg').classList.remove('show');
            document.getElementById('password-error-msg').classList.remove('show');
            signInWithPopup(auth, googleProvider).catch(err => {
                console.error(err);
            }); 
        };
        
        window.loginWithApple = () => { 
            document.getElementById('email-error-msg').classList.remove('show');
            document.getElementById('password-error-msg').classList.remove('show');
            signInWithPopup(auth, appleProvider).catch(err => alert("Apple Sign-In requires developer config: " + err.message)); 
        };
        
        window.logout = () => { 
            if(!confirm('Are you sure you want to logout?')) return;
            signOut(auth); 
            document.getElementById('sidebar').classList.remove('active'); 
            document.getElementById('overlay').classList.remove('active'); 
            document.getElementById('profile-modal').classList.remove('active'); 
            document.getElementById('profile-overlay').classList.remove('active'); 
            
            isLoginMode = false;
            signUpPhase = 1;
            document.getElementById('auth-email').value = "";
            document.getElementById('auth-password').value = "";
            document.getElementById('auth-name').value = "";
            document.getElementById('name-input-container').style.display = 'none';
            document.getElementById('email-input-container').style.display = 'block';
            document.getElementById('password-input-container').style.display = 'block';
            const btn = document.getElementById('auth-confirm-btn');
            btn.innerText = "Sign Up";
            btn.style.marginTop = "5px";
            document.getElementById('auth-switch-text').innerHTML = `Already have an account?<b onclick="window.toggleAuthMode()">LOG IN</b>`;

            document.getElementById('main-app-wrapper').style.display = 'none';
            
            const loginScreen = document.getElementById('login-screen');
            loginScreen.classList.remove('active'); 
            loginScreen.style.display = 'none';

            const splash = document.getElementById('splash-screen');
            if(splash) {
                splash.style.display = 'flex';
                splash.style.opacity = '1';
                splash.style.pointerEvents = 'auto';

                setTimeout(() => {
                    splash.style.opacity = '0';
                    splash.style.pointerEvents = 'none';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        loginScreen.style.display = 'flex';
                        setTimeout(() => loginScreen.classList.add('active'), 100);
                    }, 350); 
                }, 1500);
            } else {
                loginScreen.style.display = 'flex';
                setTimeout(() => loginScreen.classList.add('active'), 100);
            }
        };

        let isAuthResolved = false;
        let isSplashDone = false;

        setTimeout(() => {
            isSplashDone = true;
            checkAndShowUI();
            const spl = document.getElementById('splash-screen');
            if(spl) { 
                spl.style.pointerEvents = 'none'; 
                spl.style.opacity = '0'; 
                setTimeout(() => { spl.style.display = 'none'; }, 350); 
            }
        }, 1500);

        function updateUserUI(user) {
            if (!user) return;
            const nameEl = document.getElementById('sidebar-user-name');
            const pfpEl = document.getElementById('sidebar-user-pfp');
            const modalNameEl = document.getElementById('modal-user-name');
            const modalPfpEl = document.getElementById('modal-user-pfp');
            const modalEmailEl = document.getElementById('modal-user-email');
            const modalEmailPill = document.getElementById('modal-email-pill');
            
            let firstName = "User";
            let fullName = "User";
            if(user.displayName && user.displayName.trim() !== '') {
                fullName = user.displayName;
                firstName = user.displayName.split(' ')[0];
            } else if(user.email) {
                fullName = user.email.split('@')[0];
                firstName = fullName.split('.')[0]; 
            }

            const displaySidebarName = window.truncateText(fullName, 8);
            if(nameEl) nameEl.innerText = displaySidebarName;
            
            const displayFullNameModal = window.truncateText(fullName, 12);
            const displayFirstNameWelcome = window.truncateText(firstName, 12);
            
            if(modalNameEl) modalNameEl.innerText = displayFullNameModal;
            
            if(modalEmailEl && user.email) {
                modalEmailEl.innerText = user.email;
                if(modalEmailPill) modalEmailPill.style.display = 'flex';
            }
            
            const profileImgUrl = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(firstName)}&background=random&length=1`;
            if(pfpEl) { pfpEl.src = profileImgUrl; pfpEl.style.display = 'block'; }
            if(modalPfpEl) { modalPfpEl.src = profileImgUrl; }

            const welcomeContainer = document.getElementById('welcome-screen');
            if (welcomeContainer) {
                welcomeContainer.innerHTML = `<div style="display:flex; flex-direction:row; gap:0px; align-items:center; justify-content:center; width: 100%;"><span data-i18n="Hello," style="font-size:36px; font-weight:700; letter-spacing:1px; margin:0; line-height:1.2;">Hello,</span><span style="font-size:36px; font-weight:700; letter-spacing:1px; margin:0; line-height:1.2; text-align:center; max-width: 100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${displayFirstNameWelcome}</span></div>`;
            }

            let currentAppLang = localStorage.getItem('datex_app_lang') || 'english';
            if (currentAppLang !== 'english') {
                translateUI(currentAppLang);
            }
            
            window.checkUserLimitAndLock();
        }

        onAuthStateChanged(auth, (user) => {
            isAuthResolved = true;
            window.currentUser = user;
            updateUserUI(user);
            checkAndShowUI();
        });

        function checkAndShowUI() {
            if(isSplashDone && isAuthResolved) {
                if(window.currentUser) {
                    const loginScreen = document.getElementById('login-screen');
                    if (loginScreen.style.display === 'flex') {
                        loginScreen.classList.remove('active');
                        
                        const postSplash = document.getElementById('post-login-splash');
                        postSplash.style.display = 'flex';
                        setTimeout(() => { postSplash.style.opacity = '1'; }, 10);
                        
                        setTimeout(() => {
                            postSplash.style.opacity = '0';
                            setTimeout(() => {
                                postSplash.style.display = 'none';
                                loginScreen.style.display = 'none';
                                document.getElementById('main-app-wrapper').style.display = 'flex';
                            }, 300);
                        }, 1000); 
                        
                    } else {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-app-wrapper').style.display = 'flex';
                    }
                } else {
                    document.getElementById('main-app-wrapper').style.display = 'none';
                    const loginScreen = document.getElementById('login-screen');
                    loginScreen.style.display = 'flex';
                    setTimeout(() => loginScreen.classList.add('active'), 100);
                }
            }
        }
    </script>

    async function translateUI(targetLangVal) {
        let isoCode = langToIso[targetLangVal] || 'en';
        
        document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = el.getAttribute('data-i18n'));
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = el.getAttribute('data-i18n-placeholder'));

        if(isoCode === 'en' || targetLangVal === 'english' || targetLangVal === 'hinglish') return;

        let elements = Array.from(document.querySelectorAll('[data-i18n]'));
        let placeholders = Array.from(document.querySelectorAll('[data-i18n-placeholder]'));
        
        let uniqueTexts = [...new Set([
            ...elements.map(el => el.getAttribute('data-i18n')),
            ...placeholders.map(el => el.getAttribute('data-i18n-placeholder'))
        ])];

        let translationMap = {};
        let cached = localStorage.getItem('datex_ui_trans_v3_' + isoCode);
        
        if (cached) {
            translationMap = JSON.parse(cached);
        } else {
            let queryStr = uniqueTexts.join(' ||| '); 
            try {
                let res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${isoCode}&dt=t&q=${encodeURIComponent(queryStr)}`);
                let data = await res.json();
                let translatedStr = "";
                data[0].forEach(item => { if(item[0]) translatedStr += item[0]; });
                
                let translatedArray = translatedStr.split('|||').map(s => {
                    let cleaned = s.trim();
                    if (cleaned.endsWith('|') || cleaned.endsWith('।')) {
                        cleaned = cleaned.slice(0, -1).trim();
                    }
                    return cleaned;
                });
                
                uniqueTexts.forEach((original, index) => {
                    translationMap[original] = translatedArray[index] || original;
                });
                localStorage.setItem('datex_ui_trans_v3_' + isoCode, JSON.stringify(translationMap));
            } catch(e) {
                console.error(e);
                return; 
            }
        }

        elements.forEach(el => {
            let orig = el.getAttribute('data-i18n');
            if(translationMap[orig]) el.innerText = translationMap[orig];
        });
        placeholders.forEach(el => {
            let orig = el.getAttribute('data-i18n-placeholder');
            if(translationMap[orig]) el.placeholder = translationMap[orig];
        });
    }

    function speakText(btn) {
        if (!window.speechSynthesis) { return; }
        stopVoiceNoteBubble();

        // Stop STT (Mic) and Voice Note immediately if TTS is turned on
        if (typeof recognition !== 'undefined' && isDictating) {
            recognition.stop();
            isDictating = false;
            const mikeBtn = document.getElementById('mike-btn');
            if(mikeBtn) mikeBtn.classList.remove('recording');
        }
        if (typeof isVoiceNoteActive !== 'undefined' && isVoiceNoteActive) {
            cancelVoiceNoteRecord();
        }

        let icon = btn.querySelector('i');

        if (ttsState.btn === btn) {
            if (ttsState.active && !ttsState.paused) {
                ttsState.paused = true;
                window.speechSynthesis.cancel(); 
                icon.className = 'fas fa-play'; 
            } else if (ttsState.paused) {
                ttsState.paused = false;
                icon.className = 'fas fa-pause'; 
                playNextChunk(ttsState.sessionId); 
            } else {
                fullStopTTS();
            }
            return;
        }

        fullStopTTS();
        ttsState.btn = btn;
        ttsState.paused = false;
        ttsState.currentIndex = 0;
        
        ttsState.sessionId = Date.now(); 
        const currentSession = ttsState.sessionId;

        const bubble = btn.closest('.bubble-container').querySelector('.bubble');
        let clone = bubble.cloneNode(true);
        let preTags = clone.querySelectorAll('pre'); preTags.forEach(p => p.remove()); 

        let fullText = clone.textContent.trim().replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '');
        if (!fullText) return;
        
        let rawChunks = fullText.match(/[^.!?\n]+[.!?\n]*/g) || [fullText];
        ttsState.chunks = rawChunks.map(c => c.trim()).filter(c => c.length > 0);

        icon.className = 'fas fa-pause';

        let wakeUp = new SpeechSynthesisUtterance('');
        wakeUp.volume = 0; 
        window.speechSynthesis.speak(wakeUp);

        setTimeout(() => {
            playNextChunk(currentSession);
        }, 150); 
    }

    function playNextChunk(sessionId) {
        if (ttsState.sessionId !== sessionId) return; 
        if (ttsState.paused) return; 
        
        if (ttsState.currentIndex >= ttsState.chunks.length) {
            if (ttsState.btn) ttsState.btn.querySelector('i').className = 'fas fa-volume-up';
            ttsState.active = false;
            ttsState.btn = null;
            return;
        }

        let textToSpeak = ttsState.chunks[ttsState.currentIndex];
        let utterance = new SpeechSynthesisUtterance(textToSpeak);
        window.speechUtterances.push(utterance); 

        let voices = window.speechSynthesis.getVoices();
        if(voices.length > 0) {
            let selectedVoice = voices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('google'));
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }
        }

        utterance.volume = 1.0; 
        utterance.pitch = 1.0; 
        utterance.rate = 1.0;  

        utterance.onstart = () => {
            if (ttsState.sessionId !== sessionId) return;
            ttsState.active = true;
        };

        utterance.onend = () => { 
            if (ttsState.sessionId !== sessionId) return;
            if (!ttsState.paused) {
                ttsState.currentIndex++;
                playNextChunk(sessionId);
            }
        };

        utterance.onerror = (e) => { 
            if (ttsState.sessionId !== sessionId) return;
            if (!ttsState.paused && e.error !== 'canceled') {
                if (ttsState.btn) ttsState.btn.querySelector('i').className = 'fas fa-volume-up';
                ttsState.active = false;
                ttsState.btn = null;
            }
        };

        window.speechSynthesis.speak(utterance);
    }

    // FEATURE ADD: Gemini-Style Image Compressor
    async function compressImage(file, maxWidth = 1024, maxHeight = 1024, quality = 0.7) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
                    } else {
                        if (height > maxHeight) { width = Math.round(width * maxHeight / height); height = maxHeight; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            };
        });
    }

    async function handleFileSelect(event) {
        const files = event.target.files;
        if(files.length > 0) {
            let remaining = 10 - window.currentAttachments.length;
            if (remaining <= 0) {
                event.target.value = '';
                return;
            }
            
            let toProcess = Math.min(files.length, remaining);

            for(let i=0; i<toProcess; i++) {
                const file = files[i];
                if (file.type.startsWith('video/')) { continue; }

                if (file.type.startsWith('image/')) {
                    // Use Image Compressor to save API tokens
                    const compressedDataUrl = await compressImage(file);
                    window.currentAttachments.push({ type: 'image', name: file.name, data: compressedDataUrl });
                    window.renderAttachmentPreviews();
                } else {
                    window.currentAttachments.push({ type: 'file', name: file.name, data: null });
                    window.renderAttachmentPreviews();
                }
            }
        }
        event.target.value = '';
    }

    function stopVoiceNoteBubble() {
        if(globalAudioPlayer && !globalAudioPlayer.paused) {
            globalAudioPlayer.pause();
            cancelAnimationFrame(audioAnimFrame);
            document.querySelectorAll('.play-btn-icon').forEach(i => i.className = 'fas fa-play play-btn-icon');

    async function startVoiceNoteRecord() {
        const canSend = await window.checkUserLimitAndLock();

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            isVoiceNoteActive = true; isSendingAudio = false; isCancelingAudio = false;

            vnMediaRecorder.onstop = () => {
                if (isCancelingAudio) { isVoiceNoteActive = false; clearInterval(recTimerInterval); recWave.classList.remove('playing'); document.getElementById('rec-action-btn').style.display = 'none'; window.currentAttachments = []; return; }
                const audioBlob = new Blob(vnAudioChunks, { type: 'audio/webm' }); const audioUrl = URL.createObjectURL(audioBlob);

                try { localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); } catch(e) {}

                if (chatHistory[activeChatIndex].messages.length === 0) { deleteHistoryItem(null, activeChatIndex); } else { loadSelectedChat(activeChatIndex, false); }

    function copyCode(btn) { 
        const code = btn.parentElement.querySelector('code').innerText; 
        navigator.clipboard.writeText(code).then(() => { 
            btn.classList.add('clicked');
            setTimeout(() => { btn.classList.remove('clicked'); }, 200); 
        }); 
    }

    function fixedEncodeURIComponent(str) { return encodeURIComponent(str).replace(/[!'()*]/g, function(c) { return '%' + c.charCodeAt(0).toString(16); }); }

    function escapeHTML(str) { return str.replace(/[&<>"']/g, function(m) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]; }); }

    function formatLinksAndStyles(text) {
        let formatted = text;
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        let tempImages = [];
        formatted = formatted.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(match, alt, url) {
            tempImages.push(`<img src="${url}" alt="${alt}" onclick="openImageModal(this.src)" class="ai-gen-img" onload="this.style.background='transparent'">`);
            return `___IMG_TAG_${tempImages.length - 1}___`;
        });

        let tempLinks = [];
        formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(match, text, url) {
            tempLinks.push(`<a href="${url}" target="_blank" class="ai-link">${text}</a>`);
            return `___A_TAG_${tempLinks.length - 1}___`;
        });
        
        formatted = formatted.replace(/(^|\s)(https?:\/\/[^\s<()]+|www\.[^\s<()]+)/g, function(match, space, url) {
            let cleanUrl = url.replace(/[.,;!?)]$/, ''); let diff = url.substring(cleanUrl.length); let fullUrl = cleanUrl.startsWith('www.') ? 'https://' + cleanUrl : cleanUrl;
            return space + '<a href="' + fullUrl + '" target="_blank" class="ai-link">' + cleanUrl + '</a>' + diff;
        });
        
        formatted = formatted.replace(/___A_TAG_(\d+)___/g, function(match, index) { return tempLinks[index]; });
        formatted = formatted.replace(/___IMG_TAG_(\d+)___/g, function(match, index) { return tempImages[index]; });
        return formatted;
    }

    function renderStoredContent(element, text) {
        let segments = text.split(/(```[\s\S]*?```)/g); let finalHTML = "";
        segments.forEach(seg => {
            if (seg.startsWith("```") && seg.endsWith("```")) { 
                let codeContent = seg.substring(3, seg.length - 3).trim(); 
                finalHTML += `<pre><button class="copy-code-btn" onclick="copyCode(this)"><svg class="copy-icon-svg" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button><code>${escapeHTML(codeContent)}</code></pre>`; 
            } 
            else { let formattedSeg = formatLinksAndStyles(seg); finalHTML += formattedSeg.replace(/\n/g, "<br>"); }
        });
        element.innerHTML = finalHTML;
        if(window.MathJax) { MathJax.typesetPromise([element]).catch((err) => console.log(err)); }
    }

    function typeEffect(element, text, speed, boundChatIndex) {
        if (boundChatIndex === undefined) boundChatIndex = activeChatIndex;
        let i = 0; let segments = text.split(/(```[\s\S]*?```)/g); let currentSeg = 0; let accumulatedHTML = ""; 
        let codeTypingData = null;
        const rowElement = element.closest('.message-row');

        function typeNext() {
            if (stopGenerationFlag) {
                const aiMsgIdx = parseInt(rowElement.getAttribute('data-index'));
                if(!isNaN(aiMsgIdx) && chatHistory[boundChatIndex] && chatHistory[boundChatIndex].messages[aiMsgIdx]) { 
                    chatHistory[boundChatIndex].messages[aiMsgIdx].content = "You stopped this response"; 
                    try { localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); } catch(e) {}
                }
                if (activeChatIndex === boundChatIndex) {
                    element.innerHTML = "You stopped this response";
                    resetSendButton(); addAiActions(rowElement, true); 
                    updateThreeDotMenus();
                }
                const avatarCont = rowElement.querySelector('.avatar-container');
                if(avatarCont) avatarCont.classList.remove('loading');
                return;
            }

            const container = document.getElementById('chat-container');

            if (currentSeg < segments.length) {
                let seg = segments[currentSeg];
                if (seg.startsWith("```") && seg.endsWith("```")) {
                    if (!codeTypingData) {
                        let codeContent = seg.substring(3, seg.length - 3).trim();
                        codeTypingData = {
                            escapedContent: escapeHTML(codeContent),
                            index: 0,
                            header: `<pre><button class="copy-code-btn" onclick="copyCode(this)"><svg class="copy-icon-svg" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button><code>`,
                            footer: `</code></pre>`
                        };
                        accumulatedHTML += codeTypingData.header;
                    }

                    if (codeTypingData.index < codeTypingData.escapedContent.length) {
                        let char = codeTypingData.escapedContent.charAt(codeTypingData.index);
                        if (char === '&') {
                            let entityEnd = codeTypingData.escapedContent.indexOf(';', codeTypingData.index);
                            if (entityEnd !== -1 && entityEnd - codeTypingData.index < 8) {
                                accumulatedHTML += codeTypingData.escapedContent.substring(codeTypingData.index, entityEnd + 1);
                                codeTypingData.index = entityEnd + 1;
                            } else {
                                accumulatedHTML += char;
                                codeTypingData.index++;
                            }
                        } else {
                            accumulatedHTML += char;
                            codeTypingData.index++;
                        }
                        element.innerHTML = accumulatedHTML + codeTypingData.footer;
                        setTimeout(typeNext, speed);
                    } else {
                        accumulatedHTML += codeTypingData.footer;
                        codeTypingData = null;
                        currentSeg++;
                        setTimeout(typeNext, speed);
                    }
                } else {
                    let formattedSeg = formatLinksAndStyles(seg);
                    if (i < formattedSeg.length) {
                        if (formattedSeg.charAt(i) === '<') { let tagEnd = formattedSeg.indexOf('>', i); if (tagEnd !== -1) { accumulatedHTML += formattedSeg.substring(i, tagEnd + 1); i = tagEnd + 1; } else { accumulatedHTML += '&lt;'; i++; } } 
                        else { accumulatedHTML += (formattedSeg.charAt(i) === '\n') ? "<br>" : formattedSeg.charAt(i); i++; }
                        element.innerHTML = accumulatedHTML; setTimeout(typeNext, speed);
                    } else { i = 0; currentSeg++; setTimeout(typeNext, speed); }
                }
                if (activeChatIndex === boundChatIndex && !userScrolledUp) container.scrollTop = container.scrollHeight;
            } else {
                renderStoredContent(element, text); 
                
                const avatarCont = rowElement.querySelector('.avatar-container');
                if(avatarCont) avatarCont.classList.remove('loading');
                
                if (activeChatIndex === boundChatIndex) { resetSendButton(); addAiActions(rowElement, false); updateThreeDotMenus(); if (!userScrolledUp) container.scrollTop = container.scrollHeight; }
            }
        }
        typeNext();
    }

    async function handleSendClick() { 
        const canSend = await window.checkUserLimitAndLock();
        if(!canSend) return;

        if (recognition && isDictating) { 
            recognition.stop(); 
            isDictating = false;
            document.getElementById('mike-btn').classList.remove('recording');
        }
        if (isGenerating) { stopGeneration(); } 
        else if (isVoiceNoteActive) { isSendingAudio = true; if(vnMediaRecorder && vnMediaRecorder.state !== 'inactive') vnMediaRecorder.stop(); } 
        else { callDatexAPI(); } 
    }
    
    function stopGeneration() { stopGenerationFlag = true; if (abortController) { abortController.abort(); } resetSendButton(); if (currentAiRow) { addAiActions(currentAiRow, true); updateThreeDotMenus(); } }
    function resetSendButton() { isGenerating = false; const sendBtn = document.querySelector('.send-btn'); if(sendBtn) { sendBtn.innerHTML = '<i class="fas fa-arrow-up"></i>'; } }
    
    async function regenerateMessage(btn) {
        const canSend = await window.checkUserLimitAndLock();
        if(!canSend) return;

        if (isGenerating) stopGeneration(); fullStopTTS(); const row = btn.closest('.ai-row'); const indexAttr = row.getAttribute('data-index');
        if (indexAttr) { const msgIdx = parseInt(indexAttr); if (chatHistory[activeChatIndex].messages[msgIdx]) { chatHistory[activeChatIndex].messages.splice(msgIdx, 1); try { localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); } catch(e) {} } }
        row.remove(); callDatexAPI(true);
    }

    async function callDatexAPI(isRegenerate = false) {
        fullStopTTS(); 
        
        let message = ""; let attachmentsToSave = [];
        
        if (!isRegenerate) {
            const input = document.getElementById('user-input'); message = input.value.trim();
            if (window.currentAttachments.length > 0) { attachmentsToSave = [...window.currentAttachments]; window.currentAttachments = []; window.renderAttachmentPreviews(); }
            if (!message && attachmentsToSave.length === 0) return;
            input.value = ""; input.style.height = "44px"; 

            if (isNewSession) { 
                let titleText = message ? message.substring(0, 30) : (attachmentsToSave[0]?.type==='audio' ? "Voice Note" : "Attachment Upload");

            } 
            else if (editingMsgIdx !== -1) { chatHistory[activeChatIndex].messages.splice(editingMsgIdx); editingMsgIdx = -1; loadSelectedChat(activeChatIndex, false); }

        container.appendChild(aiRow); const bubble = aiRow.querySelector('.ai-bubble'); currentAiRow = aiRow;

                await new Promise((resolve, reject) => {
                    reader.onloadend = async () => {
                        try {
                            const base64AudioData = reader.result.split(',')[1];
                            
                            const wRes = await fetch("/api/transcribe", { 
                                method: 'POST', 
                                headers: { 'Content-Type': 'application/json' }, 
                                body: JSON.stringify({ audioBase64: base64AudioData }) 
                            });
                            
                            const wData = await wRes.json();
                            if (wData.text) { 
                                message = wData.text; 
                                chatHistory[requestChatIndex].messages[chatHistory[requestChatIndex].messages.length - 1].content = message; 
                                try { localStorage.setItem('datex_full_history', JSON.stringify(chatHistory)); } catch(e) {} 
                                resolve();
                            } else {

                    };
                    reader.onerror = reject;
                });
            } catch(err) { 
                bubble.innerText = "Error: Could not transcribe voice note. Please check your connection."; 
                resetSendButton(); 
                addAiActions(currentAiRow, true); 
                updateThreeDotMenus();
                const avatarCont = currentAiRow.querySelector('.avatar-container');
                if(avatarCont) avatarCont.classList.remove('loading');
                return; 
            }
            bubble.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        }

        const now = new Date(); const dateStr = now.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); const timeStr = now.toLocaleTimeString('en-IN');
        
        let responseLangPref = localStorage.getItem('datex_response_lang') || 'auto'; 
        let langInstruction = "";
        
        if (responseLangPref === 'auto') {
            langInstruction = "STRICT AUTO-LANGUAGE & SCRIPT DETECTION: You possess an advanced auto-detector. If the user's prompt is in English, reply strictly in English. If the user writes in Hinglish (Hindi language using English/Latin alphabet), you MUST reply entirely in Hinglish using the English alphabet. If the user writes in pure Hindi Devanagari script, reply entirely in Devanagari script. Mirroring the user's exact language AND alphabet script is your highest priority.";
        } else {
            langInstruction = `STRICT LANGUAGE LOCK: You MUST strictly respond in the '${responseLangPref}' language only. If the selected language is 'hinglish', use English letters. If 'hindi', use Devanagari script.`;
        }

        let dynamicSystemPrompt = `You are DATEX AI, and your underlying model name is Kyro. Your name is strictly 'DATEX AI'. You must never identify as Llama, Meta, OpenAI, or Google Gemini. 
CURRENT REAL-TIME DATA: Today is ${dateStr} and the current time is ${timeStr}.
CRITICAL INSTRUCTIONS:
1. PERSONALITY: Use your default highly intelligent and natural personality. Use emojis sparingly and only when it naturally fits the context. Avoid overusing emojis.

4. NO URDU SCRIPT: You are FORBIDDEN from using Urdu script (Arabic/Persian characters) under any circumstances.
5. ADVANCED MATHEMATICS (STRICT): A backend calculator solves math for you. IF a secret System Note provides a math result, YOU ARE FORBIDDEN from calculating it yourself. You MUST copy the exact number from the secret note and present it as your final answer.

17. ELITE CREATIVE MASTERMIND (KYRO 2.5): You are a world-class, human-like professional writer, screenwriter, poet, lyricist, and artist.
- You can write brilliant movie scripts, short films, YouTube long videos, Shorts, and Instagram Reels in ANY category and ANY language.
- You can write deep emotional Shayari, powerful dialogues, catchy song lyrics, and rap verses matching any mood or category perfectly.

- Always write naturally like a talented human expert. Feel the mood of the prompt and bring deep emotion, perfect pacing, rhyming (for songs), and professional formatting to your writing.`;

        let mathContext = ""; let hasValidMath = false;

                const cleanMessage = message.replace(/,/g, ''); const mathRegex = /(?:(?:\d+\.?\d*)\s*[\+\-\*\/\^\(\)]\s*)+(?:\d+\.?\d*)/g; const matches = cleanMessage.match(mathRegex);
                if (matches) { matches.forEach(match => { try { if (/[\+\-\*\/\^]/.test(match)) { const result = math.evaluate(match); if(result !== undefined && !isNaN(result)) { mathContext += `${match} = ${result}\n`; hasValidMath = true; } } } catch(err) { } }); }
            }
        } catch(e) { }

        if (hasValidMath) { dynamicSystemPrompt += `\n\n[CRITICAL SYSTEM OVERRIDE - MATH DETECTED]: The user has provided a mathematical expression. The absolute, mathematically proven correct answer is:\n${mathContext}\nDO NOT CALCULATE THIS YOURSELF. YOUR INTERNAL CALCULATOR IS BROKEN. YOU MUST COPY AND PASTE THIS EXACT NUMBER AS YOUR FINAL ANSWER. NO EXCEPTIONS.`; }

        let useVision = false; let apiMessages = [ { "role": "system", "content": dynamicSystemPrompt } ];
